<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Expired - VLX Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen antialiased text-gray-800 items-center justify-center">

    <div class="max-w-md w-full px-6 py-12 text-center bg-white border border-gray-200 rounded-3xl shadow-xs space-y-6">
        <!-- Error Icon -->
        <div class="p-4 bg-rose-50 border border-rose-100 rounded-full w-fit mx-auto text-rose-600">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>

        <div class="space-y-2">
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">Access Link Expired</h1>
            <p class="text-xs text-gray-400 max-w-xs mx-auto leading-relaxed">The document key you requested is either invalid, expired, or has been purged from our temporary caching database.</p>
        </div>

        <!-- Call to actions -->
        <div class="pt-4 flex flex-col space-y-3">
            <a href="/pdf_maker" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition shadow-sm text-center">
                Create New Document
            </a>
            <a href="/" class="w-full py-3 border border-gray-200 text-gray-600 text-xs font-bold rounded-xl hover:bg-gray-50 transition text-center">
                Back to Portal
            </a>
        </div>
    </div>

    <p class="text-[10px] text-gray-400 mt-6">Powered by <span class="font-bold text-gray-500">TechLite</span> &middot; VLX Tools</p>

</body>
</html>
