<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Templates - VLX Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen antialiased text-gray-800">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-2">
                <div class="text-3xl font-black tracking-tighter leading-none flex select-none">
                    <span class="text-red-600">V</span>
                    <span class="text-blue-600">L</span>
                    <span class="text-emerald-500">X</span>
                </div>
                <span class="text-xl font-extrabold text-gray-900 tracking-tight">Tools</span>
            </a>
            <div class="flex items-center space-x-3">
                <a href="/pdf_maker" class="px-4 py-2 border border-gray-200 text-xs font-bold text-gray-600 rounded-xl hover:bg-gray-50 flex items-center transition">
                    <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    New Document
                </a>
            </div>
        </div>
    </header>

    <!-- Main Workspace Split -->
    <main class="flex-1 flex flex-col lg:flex-row min-h-0 overflow-hidden">
        
        <!-- Left Side: Controls Board -->
        <div class="w-full lg:w-96 bg-white border-b lg:border-b-0 lg:border-r border-gray-200 p-6 flex flex-col justify-between shrink-0 space-y-6">
            <div class="space-y-6">
                <div>
                    <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 px-2.5 py-1 rounded-full uppercase tracking-wide">Key: {{ key }}</span>
                    <h1 class="text-2xl font-black text-gray-900 tracking-tight mt-3">Select Visual Style</h1>
                    <p class="text-xs text-gray-400 mt-0.5">Choose any of the three custom generated visual structures designed by Gemini.</p>
                </div>

                <!-- Tab Selectors -->
                <div class="space-y-3">
                    <button type="button" id="tab-btn-1" onclick="switchStyle(1)" class="w-full p-4 text-left rounded-xl border border-indigo-500 bg-indigo-50/45 text-indigo-950 hover:bg-indigo-50 transition flex items-center justify-between group">
                        <div>
                            <span class="block text-[9px] font-black uppercase text-indigo-500 tracking-wider">Option 1</span>
                            <span class="font-bold text-sm">{{ style_1 }}</span>
                        </div>
                        <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4"></path></svg>
                    </button>

                    <button type="button" id="tab-btn-2" onclick="switchStyle(2)" class="w-full p-4 text-left rounded-xl border border-gray-200 bg-gray-50 text-gray-700 hover:bg-gray-100/70 transition flex items-center justify-between group">
                        <div>
                            <span class="block text-[9px] font-black uppercase text-gray-400 tracking-wider">Option 2</span>
                            <span class="font-bold text-sm">{{ style_2 }}</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-400 hidden group-hover:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                    </button>

                    <button type="button" id="tab-btn-3" onclick="switchStyle(3)" class="w-full p-4 text-left rounded-xl border border-gray-200 bg-gray-50 text-gray-700 hover:bg-gray-100/70 transition flex items-center justify-between group">
                        <div>
                            <span class="block text-[9px] font-black uppercase text-gray-400 tracking-wider">Option 3</span>
                            <span class="font-bold text-sm">{{ style_3 }}</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-400 hidden group-hover:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Download and Print Actions -->
            <div class="space-y-3 pt-6 border-t border-gray-100">
                <button type="button" onclick="triggerPrint()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl flex items-center justify-center space-x-2 shadow-sm transition cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    <span>Print or Export as PDF</span>
                </button>

                <a id="download-link" href="/download_doc/{{ key }}/1" class="w-full py-3 border border-gray-200 text-gray-700 text-xs font-bold rounded-xl flex items-center justify-center space-x-2 hover:bg-gray-50 transition text-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span>Download Raw HTML</span>
                </a>
            </div>
        </div>

        <!-- Right Side: Real-Time Frame Preview -->
        <div class="flex-1 bg-gray-100 p-4 md:p-8 flex flex-col items-center justify-center overflow-auto">
            <div class="w-full max-w-[800px] h-[1000px] bg-white rounded-2xl shadow-md border border-gray-250/60 overflow-hidden flex flex-col">
                <div class="bg-gray-50 border-b border-gray-150 px-4 py-3 shrink-0 flex items-center justify-between text-xs text-gray-400 font-bold uppercase tracking-wider">
                    <div class="flex items-center space-x-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-red-400"></span>
                        <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
                        <span class="w-2.5 h-2.5 rounded-full bg-green-400"></span>
                    </div>
                    <span id="preview-tag-title">{{ style_1 }} Preview</span>
                    <span>100% Zoom</span>
                </div>
                <!-- Interactive iframe target -->
                <iframe id="preview-frame" class="w-full flex-1 border-0" sandbox="allow-same-origin allow-scripts"></iframe>
            </div>
        </div>

    </main>

    <!-- Pre-populated template contents -->
    <script>
        const docTemplates = {
            1: `{{ template_1 | safe }}`,
            2: `{{ template_2 | safe }}`,
            3: `{{ template_3 | safe }}`
        };

        const docStyles = {
            1: "{{ style_1 }}",
            2: "{{ style_2 }}",
            3: "{{ style_3 }}"
        };

        let activeStyleId = 1;

        const iframe = document.getElementById("preview-frame");
        const downloadLink = document.getElementById("download-link");
        const previewTagTitle = document.getElementById("preview-tag-title");

        function switchStyle(id) {
            // Remove selection class from all tab buttons
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`tab-btn-${i}`);
                if (i === id) {
                    btn.className = "w-full p-4 text-left rounded-xl border border-indigo-500 bg-indigo-50/45 text-indigo-950 hover:bg-indigo-50 transition flex items-center justify-between group";
                    btn.querySelector("svg").className = "w-4 h-4 text-indigo-600";
                } else {
                    btn.className = "w-full p-4 text-left rounded-xl border border-gray-200 bg-gray-50 text-gray-700 hover:bg-gray-100/70 transition flex items-center justify-between group";
                    btn.querySelector("svg").className = "w-4 h-4 text-gray-400 hidden group-hover:block";
                }
            }

            activeStyleId = id;
            previewTagTitle.textContent = `${docStyles[id]} Preview`;
            downloadLink.href = `/download_doc/{{ key }}/${id}`;
            
            // Inject template string safely inside frame body
            writeIframeContent(docTemplates[id]);
        }

        function writeIframeContent(htmlContent) {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(htmlContent);
            doc.close();
        }

        function triggerPrint() {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }

        // Auto load initial style
        switchStyle(1);
    </script>
</body>
</html>
